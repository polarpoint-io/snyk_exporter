name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚨 Breaking Changes"
    labels:
      - breaking
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
  - title: "🐛 Bug Fixes"
    labels:
      - fix
      - bugfix
      - bug
  - title: "🔒 Security"
    labels:
      - security
  - title: "⬆️ Dependencies"
    labels:
      - dependencies
      - deps
  - title: "📖 Documentation"
    labels:
      - documentation
      - docs
  - title: "🧹 Maintenance"
    labels:
      - chore
      - maintenance

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - fix
      - bugfix
      - bug
      - security
      - dependencies
      - deps
      - documentation
      - docs
      - chore
      - maintenance
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/polarpoint-io/snyk_exporter/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
