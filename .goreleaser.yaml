builds:
  - id: snyk_exporter
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

dockers:
  - ids:
      - snyk_exporter
    dockerfile: Dockerfile-goreleaser
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/polarpoint-io/snyk_exporter"
    image_templates:
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-amd64"
  - ids:
      - snyk_exporter
    dockerfile: Dockerfile-goreleaser
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.source=https://github.com/polarpoint-io/snyk_exporter"
    image_templates:
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-arm64"

docker_manifests:
  - name_template: "ghcr.io/polarpoint-io/snyk_exporter:latest"
    image_templates:
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-amd64"
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}"
    image_templates:
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-amd64"
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/polarpoint-io/snyk_exporter:v{{ .Major }}"
    image_templates:
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-amd64"
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/polarpoint-io/snyk_exporter:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-amd64"
      - "ghcr.io/polarpoint-io/snyk_exporter:{{ .Tag }}-arm64"

archives:
  - format: binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}-checksums.txt"

snapshot:
  name_template: "git-{{.Commit}}"

release:
  name_template: "v{{.Version}}"

changelog:
  disable: true
