builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

dockers:
  - dockerfile: Dockerfile-goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    image_templates:
      - "ghcr.io/polarpoint-io/snyk_exporter:latest"
      - "ghcr.io/polarpoint-io/snyk_exporter:v{{ .Major }}"
      - "ghcr.io/polarpoint-io/snyk_exporter:v{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/polarpoint-io/snyk_exporter:v{{ .Major }}.{{ .Minor }}.{{ .Patch }}"
    goarch: amd64

archives:
  - format: binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}-checksums.txt"

snapshot:
  name_template: "git-{{.Commit}}"

release:
  name_template: "v{{.Version}}"

changelog:
  disable: true
